name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Build, Lint, Format, TypeCheck and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint and Formating
        run: pnpm check:lint

      - name: Type check
        run: pnpm check:type

      - name: Test
        run: pnpm test

  test-typescript-matrix:
    name: Test (TypeScript ${{ matrix.typescript }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript: ["5.0", "5.4", "5.8", "6.0"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Override TypeScript version
        run: pnpm add -D typescript@~${{ matrix.typescript }}

      - name: Test
        run: pnpm test
